name: Backend CI

on:
  push:
    branches:
      - chore/backend-ci
      - main
      - Desenvolupament
      - desenvolupament
      - "feature/**"
    paths:
      - "backend/**"
      - 'README.md'
      - ".github/workflows/backend-ci.yml"

  pull_request:
    branches:
      - main
      - Desenvolupament
      - desenvolupament
    paths:
      - "backend/**"
      - 'README.md'
      - ".github/workflows/backend-ci.yml"

  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: buildrank
          POSTGRES_USER: buildrank_user
          POSTGRES_PASSWORD: buildrank_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U buildrank_user -d buildrank"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DB_NAME: buildrank
      DB_USER: buildrank_user
      DB_PASSWORD: buildrank_pass
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: config.settings
      PYTHONUNBUFFERED: 1
      DEBUG: "False"
      ENVIRONMENT: test
      ENABLE_DEBUG_TOOLBAR: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1"
      CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1"
      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOW_CREDENTIALS: "True"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import socket
          import time

          host = "127.0.0.1"
          port = 5432

          for _ in range(30):
              try:
                  with socket.create_connection((host, port), timeout=2):
                      print("PostgreSQL is ready")
                      break
              except OSError:
                  time.sleep(2)
          else:
              raise SystemExit("PostgreSQL did not become ready in time")
          PY

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run
      
      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Django system check
        run: python manage.py check

      - name: Run tests with coverage
        run: |
          pip install coverage
          coverage run manage.py test apps.accounts apps.buildings -v 2
          coverage report
          coverage xml

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml