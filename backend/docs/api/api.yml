          - $ref: '#/components/schemas/AdminFincaVerificationResult'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        score:
          type: number
          format: double
          readOnly: true
          nullable: true
