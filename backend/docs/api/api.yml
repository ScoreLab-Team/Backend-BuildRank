      - edifici_detail
      - id
      - result
      - score
      - score_flags
      - status
      - suggeriment
      - updated_at
      - user
      - user_detail
    AdminFincaDocumentVerificationCreate:
      type: object
      description: |-
        Escriptura: rep edifici + llistes paral·leles de fitxers i tipus.

        Camp recomanat:
            edifici              = 1
            documents_fitxer     = <file1>
            documents_fitxer     = <file2>
            documents_doc_type   = identificatiu
            documents_doc_type   = certificat

        Per compatibilitat temporal també s'accepta:
            documents_doctype
      properties:
        edifici:
          type: integer
        documents_fitxer:
          type: array
          items:
            type: string
            format: uri
          writeOnly: true
        documents_doc_type:
          type: array
          items:
            $ref: '#/components/schemas/DocTypeEnum'
          writeOnly: true
        documents_doctype:
          type: array
          items:
            $ref: '#/components/schemas/DocTypeEnum'
          writeOnly: true
      required:
      - documents_fitxer
      - edifici
