services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - /opt/buildrank/env/db.env
    volumes:
      - /opt/buildrank/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildrank_user -d buildrank"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./backend
    restart: unless-stopped
    env_file:
      - /opt/buildrank/env/backend.env
    command: gunicorn --config gunicorn.staging.conf.py config.wsgi:application
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  static_volume: