services:

  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       buildrank
      POSTGRES_USER:     buildrank_user
      POSTGRES_PASSWORD: buildrank_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildrank_user -d buildrank"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis — broker de Celery
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Ollama — LLM local
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Django amb Gunicorn
  web:
    build: ./backend
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/verifications
    command: sh -c "python manage.py collectstatic --noinput && gunicorn --config gunicorn.conf.py config.wsgi:application"
    environment:
      DEBUG:              "True"
      DB_HOST:            db
      DB_PORT:            "5432"
      DB_NAME:            buildrank
      DB_USER:            buildrank_user
      DB_PASSWORD:        buildrank_pass
      CELERY_BROKER_URL:  redis://redis:6379/0
      OLLAMA_BASE_URL:    http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  # Celery worker — pipeline OCR + LLM
  celery_worker:
    build: ./backend
    volumes:
      - ./backend:/app
      - media_volume:/app/verifications
    command: celery -A config worker --loglevel=info --concurrency=2
    environment:
      DEBUG:              "True"
      DB_HOST:            db
      DB_PORT:            "5432"
      DB_NAME:            buildrank
      DB_USER:            buildrank_user
      DB_PASSWORD:        buildrank_pass
      CELERY_BROKER_URL:  redis://redis:6379/0
      OLLAMA_BASE_URL:    http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # Nginx com a reverse proxy
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
  ollama_data: