services:

  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       buildrank
      POSTGRES_USER:     buildrank_user
      POSTGRES_PASSWORD: buildrank_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildrank_user -d buildrank"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis — broker de Celery
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Django amb Gunicorn
  web:
    build: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/verifications
    command: sh -c "python manage.py collectstatic --noinput && gunicorn --config gunicorn.conf.py config.wsgi:application"
    environment:
      DEBUG:       "True"
      ENVIRONMENT: "development"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-*}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}"
      CORS_ALLOW_ALL_ORIGINS: "${CORS_ALLOW_ALL_ORIGINS:-True}"
      CORS_ALLOW_CREDENTIALS: "${CORS_ALLOW_CREDENTIALS:-True}"
      STREAM_TOKEN_EXPIRATION_SECONDS: "${STREAM_TOKEN_EXPIRATION_SECONDS:-3600}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     buildrank
      DB_USER:     buildrank_user
      DB_PASSWORD: buildrank_pass
      CELERY_BROKER_URL:  redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  # Celery worker — processa el pipeline OCR + LLM
  celery_worker:
    build: ./backend
    volumes:
      - ./backend:/app
      - media_volume:/app/verifications   # mateix volum que web per accedir als fitxers
    command: celery -A config worker --loglevel=info --concurrency=2
    environment:
      DEBUG:              "True"
      DB_HOST:            db
      DB_PORT:            "5432"
      DB_NAME:            buildrank
      DB_USER:            buildrank_user
      DB_PASSWORD:        buildrank_pass
      CELERY_BROKER_URL:  redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx com a reverse proxy
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: