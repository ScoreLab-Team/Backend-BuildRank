  /api/buildings/edificis/mapa/:
    get:
      operationId: buildings_edificis_mapa_retrieve
      description: |-
        Retorna edificis actius amb coordenades vàlides en format GeoJSON `FeatureCollection`.

        **Query params:**
        - `scope`: `public` (tots els actius, defecte) | `mine` (els de l'usuari).
        - `bbox`: `minLng,minLat,maxLng,maxLat` — filtra per bounding box.
        - `tipologia`: ex. `Residencial`.
        - `score_min`: puntuació mínima (float).
        - `q`: cerca per carrer, barri o codi postal.
        - `limit`: màxim de resultats (1–1000, defecte 500).
      summary: Edificis en format GeoJSON per al mapa
      parameters:
      - in: query
        name: bbox
        schema:
          type: string
        description: 'Format: minLng,minLat,maxLng,maxLat'
      - in: query
        name: limit
        schema:
          type: integer
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: scope
        schema:
          type: string
      - in: query
        name: score_min
        schema:
          type: number
          format: float
      - in: query
        name: tipologia
        schema:
          type: string
      tags:
      - Edificis
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapaResponse'
          description: GeoJSON FeatureCollection.
        '400':
          description: Paràmetre bbox o score_min invàlid.
