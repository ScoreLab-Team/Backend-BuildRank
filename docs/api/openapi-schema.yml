openapi: 3.0.3
info:
  title: ''
  version: 0.0.0
paths:
  /api/accounts/admin/dashboard-summary/:
    get:
      operationId: accounts_admin_dashboard_summary_retrieve
      description: Mètriques agregades per al panell d'administració del sistema.
      tags:
      - accounts
      responses:
        '200':
          description: No response body
  /api/accounts/edificis/{id_edifici}/assignar-admin/:
    patch:
      operationId: accounts_edificis_assignar_admin_partial_update
      parameters:
      - in: path
        name: id_edifici
        schema:
          type: integer
        required: true
      tags:
      - accounts
      responses:
        '200':
          description: No response body
  /api/accounts/habitatges/{ref_cadastral}/assignar-resident/:
    patch:
      operationId: accounts_habitatges_assignar_resident_partial_update
      description: |-
        Mixin per a vistes DRF que necessiten validació ABAC.

        Ús a la vista:
            class MevaVista(ABACMixin, APIView):
                def get(self, request, edifici_id):
                    self.check_edifici_access(request, edifici_id)
                    ...
      parameters:
      - in: path
        name: ref_cadastral
        schema:
          type: string
        required: true
      tags:
      - accounts
      responses:
        '200':
          description: No response body
  /api/accounts/login/:
    post:
      operationId: accounts_login_create
      tags:
      - accounts
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/accounts/logout/:
    post:
      operationId: accounts_logout_create
      tags:
      - accounts
      responses:
        '200':
          description: No response body
  /api/accounts/me/:
    get:
      operationId: accounts_me_retrieve
      tags:
      - accounts
      responses:
        '200':
          description: No response body
    put:
      operationId: accounts_me_update
      tags:
      - accounts
      responses:
        '200':
          description: No response body
    patch:
      operationId: accounts_me_partial_update
      tags:
      - accounts
      responses:
        '200':
          description: No response body
  /api/accounts/me/edificis/:
    get:
      operationId: accounts_me_edificis_retrieve
      tags:
      - accounts
      responses:
        '200':
          description: No response body
  /api/accounts/me/role/:
    patch:
      operationId: accounts_me_role_partial_update
      tags:
      - accounts
      responses:
        '200':
          description: No response body
  /api/accounts/oauth/google/:
    post:
      operationId: accounts_oauth_google_create
      tags:
      - accounts
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/accounts/password-reset/:
    post:
      operationId: accounts_password_reset_create
      tags:
      - accounts
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/accounts/password-reset-confirm/:
    post:
      operationId: accounts_password_reset_confirm_create
      tags:
      - accounts
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/accounts/refresh/:
    post:
      operationId: accounts_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/accounts/register/:
    post:
      operationId: accounts_register_create
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/accounts/users/:
    get:
      operationId: accounts_users_list
      description: Llista tots els usuaris de la plataforma.
      tags:
      - accounts
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserAdmin'
          description: ''
  /api/accounts/users/{id}/:
    get:
      operationId: accounts_users_retrieve
      description: Detall d'un usuari concret.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAdmin'
          description: ''
  /api/accounts/users/{id}/block/:
    post:
      operationId: accounts_users_block_create
      description: |-
        Bloqueja permanentment un compte.
        Revoca immediatament totes les sessions actives de l'usuari.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      responses:
        '200':
          description: No response body
  /api/accounts/users/{id}/suspend/:
    post:
      operationId: accounts_users_suspend_create
      description: |-
        Suspèn temporalment un compte.
        Camps opcionals: reason (text), suspended_until (datetime; null = indefinit).
        Revoca immediatament totes les sessions actives.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      responses:
        '200':
          description: No response body
  /api/accounts/users/{id}/unblock/:
    post:
      operationId: accounts_users_unblock_create
      description: Desbloqueja un compte i el torna a l'estat actiu.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      responses:
        '200':
          description: No response body
  /api/accounts/users/{id}/unsuspend/:
    post:
      operationId: accounts_users_unsuspend_create
      description: Aixeca la suspensió d'un compte i el torna a l'estat actiu.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      responses:
        '200':
          description: No response body
  /api/audit/logs/:
    get:
      operationId: audit_logs_list
      description: |-
        GET /api/audit/logs/

        Paràmetres de filtratge (query params):
          - user_id       : filtra per usuari
          - method        : GET, POST, PUT, PATCH, DELETE
          - resource_type : buildings, accounts, verification...
          - status_code   : codi de resposta HTTP
          - from_date     : ISO 8601, ex. 2026-05-01
          - to_date       : ISO 8601, ex. 2026-05-31
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - audit
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogList'
          description: ''
  /api/buildings/admin-finca/edificis/alta/:
    post:
      operationId: buildings_admin_finca_edificis_alta_create
      description: |-
        Un administrador de finca (amb verificació documental aprovada) pot reclamar la gestió d'un edifici.

        - Si l'edifici ja existeix i no té admin: s'inicia el procés de verificació.
        - Si l'edifici no existeix: es crea i s'inicia la verificació.
        - Si ja té un altre admin assignat: retorna `409 Conflict`.
      summary: Alta i reclamació d'edifici per part d'un administrador de finca
      tags:
      - Administrador de finca
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminFincaAltaResponse'
          description: Edifici existent localitzat. Cal verificació documental.
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminFincaAltaResponse'
          description: Edifici nou creat. Cal verificació documental.
        '400':
          description: Dades invàlides.
        '403':
          description: Compte d'admin pendent de validació o rebutjat.
        '409':
          description: L'edifici ja té un administrador assignat.
  /api/buildings/carrers/autocomplete/:
    get:
      operationId: buildings_carrers_autocomplete_list
      description: Cerca tolerant per nom oficial i curt, ignorant stopwords comunes
        (`carrer`, `avinguda`, `de`, etc.). Retorna màxim 10 resultats.
      summary: Suggeriments de carrers per a formularis
      parameters:
      - in: query
        name: q
        schema:
          type: string
        description: Text a cercar (mínim 2 caràcters).
        required: true
      tags:
      - Utilitats
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AutocompleteCarrerItem'
          description: ''
  /api/buildings/dades_energetiques/:
    get:
      operationId: buildings_dades_energetiques_list
      tags:
      - buildings
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DadesEnergetiques'
          description: ''
    post:
      operationId: buildings_dades_energetiques_create
      tags:
      - buildings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DadesEnergetiques'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DadesEnergetiques'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DadesEnergetiques'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DadesEnergetiques'
          description: ''
  /api/buildings/dades_energetiques/{id}/:
    get:
      operationId: buildings_dades_energetiques_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this dades energetiques.
        required: true
      tags:
      - buildings
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DadesEnergetiques'
          description: ''
    put:
      operationId: buildings_dades_energetiques_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this dades energetiques.
        required: true
      tags:
      - buildings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DadesEnergetiques'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DadesEnergetiques'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DadesEnergetiques'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DadesEnergetiques'
          description: ''
    patch:
      operationId: buildings_dades_energetiques_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this dades energetiques.
        required: true
      tags:
      - buildings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDadesEnergetiques'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDadesEnergetiques'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDadesEnergetiques'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DadesEnergetiques'
          description: ''
    delete:
      operationId: buildings_dades_energetiques_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this dades energetiques.
        required: true
      tags:
      - buildings
      responses:
        '204':
          description: No response body
  /api/buildings/edificis/:
    get:
      operationId: buildings_edificis_list
      description: |-
        Retorna els edificis als quals l'usuari té accés segons el seu rol.

        - **Superuser:** tots els edificis (actius per defecte; `?inclou_desactivats=true` per veure'ls tots).
        - **Admin finca:** edificis que administra (verificació documental aprovada).
        - **Owner/Tenant:** edificis on té habitatge vinculat.
      summary: Llista els edificis accessibles per l'usuari autenticat
      parameters:
      - in: query
        name: inclou_desactivats
        schema:
          type: boolean
        description: Només superuser. Inclou edificis desactivats.
      tags:
      - Edificis
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: {}
                  description: Unspecified response body
          description: ''
        '401':
          description: No autenticat.
    post:
      operationId: buildings_edificis_create
      description: Només admins de finca o superusers. La vinculació efectiva es produeix
        un cop aprovada la verificació documental.
      summary: Crea un nou edifici
      tags:
      - Edificis
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdificiDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EdificiDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EdificiDetail'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '400':
          description: Dades invàlides.
  /api/buildings/edificis/{idEdifici}/:
    get:
      operationId: buildings_edificis_retrieve
      summary: Detall d'un edifici
      parameters:
      - in: path
        name: idEdifici
        schema:
          type: integer
        description: A unique integer value identifying this edifici.
        required: true
      tags:
      - Edificis
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '403':
          description: Sense permisos.
        '404':
          description: No trobat.
    put:
      operationId: buildings_edificis_update
      summary: Actualitza un edifici (PUT)
      parameters:
      - in: path
        name: idEdifici
        schema:
          type: integer
        description: A unique integer value identifying this edifici.
        required: true
      tags:
      - Edificis
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdificiDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EdificiDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EdificiDetail'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '400':
          description: Dades invàlides.
        '403':
          description: Sense permisos.
    patch:
      operationId: buildings_edificis_partial_update
      summary: Actualitza parcialment un edifici (PATCH)
      parameters:
      - in: path
        name: idEdifici
        schema:
          type: integer
        description: A unique integer value identifying this edifici.
        required: true
      tags:
      - Edificis
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEdificiDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEdificiDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEdificiDetail'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '400':
          description: Dades invàlides.
        '403':
          description: Sense permisos.
    delete:
      operationId: buildings_edificis_destroy
      summary: Elimina un edifici
      parameters:
      - in: path
        name: idEdifici
        schema:
          type: integer
        description: A unique integer value identifying this edifici.
        required: true
      tags:
      - Edificis
      responses:
        '204':
          description: Eliminat correctament.
        '403':
          description: Sense permisos.
  /api/buildings/edificis/{idEdifici}/badges/:
    get:
      operationId: buildings_edificis_badges_retrieve
      description: |-
        Retorna les insígnies actives de l'edifici.

        Amb `?temporada=<id>` retorna les permanents + les d'aquella temporada.
      summary: Insígnies assignades a un edifici
      parameters:
      - in: path
        name: idEdifici
        schema:
          type: integer
        description: A unique integer value identifying this edifici.
        required: true
      - in: query
        name: temporada
        schema:
          type: integer
        description: ID de temporada per filtrar.
      tags:
      - Badges
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadgesResponse'
          description: ''
  /api/buildings/edificis/{idEdifici}/badges/recalcular/:
    post:
      operationId: buildings_edificis_badges_recalcular_create
      description: Accessible per admin de sistema o administrador de finca de l'edifici.
      summary: Recalcula les insígnies d'un edifici
      parameters:
      - in: path
        name: idEdifici
        schema:
          type: integer
        description: A unique integer value identifying this edifici.
        required: true
      tags:
      - Badges
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdificiDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EdificiDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EdificiDetail'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecalcularBadgesResponse'
          description: ''
        '403':
          description: Sense permisos.
  /api/buildings/edificis/{idEdifici}/dades_energetiques/:
    get:
      operationId: buildings_edificis_dades_energetiques_retrieve
      description: Retorna les dades energètiques filtrades per rol. Admin veu totes;
        Owner/Tenant les seves.
      summary: Dades energètiques dels habitatges d'un edifici
      parameters:
      - in: path
        name: idEdifici
        schema:
          type: integer
        description: A unique integer value identifying this edifici.
        required: true
      tags:
      - Edificis
      responses:
        '200':
          description: Llista de dades energètiques per habitatge.
        '404':
          description: No hi ha dades energètiques disponibles.
  /api/buildings/edificis/{idEdifici}/desactivar/:
    post:
      operationId: buildings_edificis_desactivar_create
      description: |-
        Sense `?confirmat=true` → **dry-run**: retorna advertències sense executar res.

        Amb `?confirmat=true` → executa la desactivació i registra l'auditoria.

        Requereix rol **admin sistema**.
      summary: Desactiva un edifici
      parameters:
      - in: query
        name: confirmat
        schema:
          type: boolean
        description: Si `true`, executa la desactivació. Si no, dry-run.
      - in: path
        name: idEdifici
        schema:
          type: integer
        description: A unique integer value identifying this edifici.
        required: true
      tags:
      - Edificis
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesactivarBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DesactivarBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DesactivarBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesactivarDryRunResponse'
          description: Dry-run (sense confirmat) o desactivació executada.
        '400':
          description: L'edifici ja estava desactivat.
        '403':
          description: Sense permisos (cal admin sistema).
  /api/buildings/edificis/{idEdifici}/habitatges/:
    get:
      operationId: buildings_edificis_habitatges_retrieve
      description: Admin finca veu tots. Owner/Tenant veu només els seus.
      summary: Llista els habitatges d'un edifici
      parameters:
      - in: path
        name: idEdifici
        schema:
          type: integer
        description: A unique integer value identifying this edifici.
        required: true
      tags:
      - Edificis
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /api/buildings/edificis/{idEdifici}/habitatges/{referenciaCadastral}/:
    get:
      operationId: buildings_edificis_habitatges_retrieve_2
      summary: Detall d'un habitatge concret d'un edifici
      parameters:
      - in: path
        name: idEdifici
        schema:
          type: integer
        description: A unique integer value identifying this edifici.
        required: true
      - in: path
        name: referenciaCadastral
        schema:
          type: string
        description: Referència cadastral de l'habitatge.
        required: true
      tags:
      - Edificis
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '403':
          description: Sense permisos.
        '404':
          description: Habitatge no trobat.
  /api/buildings/edificis/{idEdifici}/me/habitatge/{referenciaCadastral}/:
    patch:
      operationId: buildings_edificis_me_habitatge_partial_update
      summary: Actualitza les dades del propi habitatge (PATCH)
      parameters:
      - in: path
        name: idEdifici
        schema:
          type: integer
        description: A unique integer value identifying this edifici.
        required: true
      - in: path
        name: referenciaCadastral
        schema:
          type: string
        required: true
      tags:
      - Edificis
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEdificiDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEdificiDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEdificiDetail'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '403':
          description: Sense permisos.
        '404':
          description: Habitatge no trobat.
