  /api/third-party-service/:
    post:
      operationId: third_party_service_create
      description: |-
        Rep una llista de parells de coordenades (lat/lng) i retorna el **Building Health Score (BHS)** de l'edifici corresponent.

        **Flux intern per cada punt:**
        1. Geocodificació inversa via OpenStreetMap (Nominatim).
        2. Validació que les coordenades pertanyen a Barcelona.
        3. Cerca de l'edifici (coincidència exacta → carrer com a fallback).

        Si no es troba l'edifici, `score` és aleatori i `match_type` és `cap`.

        **Rate limiting:** 1 req/s per Nominatim. Per a volums >500 punts, contacteu-nos.

        **Autenticació:** `Authorization: Api-Key <token>`.
      summary: Consulta el Building Health Score per coordenades
      tags:
      - Third-party
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThirdPartyRequest'
            examples:
              RequestD'exemple:
                value:
                  points:
                  - lat: 41.3901
                    lng: 2.1542
                  - lat: 41.3875
                    lng: 2.1601
                  - lat: 40.4168
                    lng: -3.7038
                summary: Request d'exemple
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ThirdPartyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ThirdPartyRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThirdPartyResponse'
              examples:
                RespostaMixta:
                  value:
                    results:
                    - lat: 41.3901
                      lng: 2.1542
                      score: 73.4
                      match_type: exacta
                    - lat: 41.3875
                      lng: 2.1601
                      score: 55.2
                      match_type: carrer
                    - lat: 40.4168
                      lng: -3.7038
                      score: 42.1
                      match_type: cap
                  summary: Resposta mixta
          description: Llista de resultats en el mateix ordre que els punts d'entrada.
        '400':
          description: El camp `points` no és una llista vàlida.
        '403':
          description: API Key absent o invàlida.
  /api/verification/:
    get:
      operationId: verification_list
      description: |-
        Retorna la llista de verificacions documentals paginada.

        - **AdminSistema**: veu totes les verificacions del sistema.
        - **AdminFinca**: veu únicament les seves pròpies verificacions.

        Cada element inclou el detall de l'usuari, l'edifici, els documents adjunts i el resultat de la verificació si ja s'ha processat.
      summary: Llistar verificacions documentals
      tags:
      - Verificació
      responses:
        '200':
          description: Llista de verificacions obtinguda correctament.
        '401':
          description: No autenticat. Cal proporcionar credencials vàlides.
        '403':
          description: Sense permisos. Només accessible per AdminFinca o AdminSistema.
  /api/verification/{id}/:
    get:
      operationId: verification_retrieve
      description: |-
        Retorna el detall complet d'una verificació documental: informació de l'usuari, l'edifici, tots els documents adjunts (amb text OCR i dades extretes), el resultat agregat i el scoring calculat.

        - **AdminSistema**: pot consultar qualsevol verificació.
        - **AdminFinca**: només pot consultar les seves pròpies verificacions.
      summary: Obtenir el detall d'una verificació
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Identificador únic de la verificació.
        required: true
      tags:
      - Verificació
      responses:
        '200':
          description: Detall de la verificació obtingut correctament.
        '401':
          description: No autenticat. Cal proporcionar credencials vàlides.
        '403':
          description: Sense permisos. Només accessible per AdminFinca o AdminSistema.
        '404':
          description: Verificació no trobada.
  /api/verification/{id}/revisar/:
    post:
      operationId: verification_revisar_create
      description: |-
        Permet a un **AdminSistema** (superusuari) aprovar o rebutjar una verificació que es trobi en estat `review` (revisió manual pendent).

        En cas d'aprovació, s'assigna l'administrador de finca a l'edifici corresponent. En cas de rebuig, cal indicar obligatòriament un motiu que quedarà registrat.

        **Estats possibles de la verificació:**
        - `pending` — pendent de processament
        - `running` — pipeline en execució
        - `review` — pendent de revisió manual, únic estat des del qual es pot revisar
        - `approved` — aprovada
        - `rejected` — rebutjada
      summary: Aprovar o rebutjar una verificació (revisió manual)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Identificador únic de la verificació a revisar.
        required: true
      tags:
      - Verificació
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevisioRequest'
            examples:
              Aprovació:
                value:
                  accio: aprovar
              RebuigAmbMotiu:
                value:
                  accio: rebutjar
                  motiu: El certificat aportat ha caducat.
                summary: Rebuig amb motiu
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RevisioRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RevisioRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevisioOk'
              examples:
                RespostaAprovació:
                  value:
                    detail: 'Verificació #42 aprovada.'
                    edifici: 7
                    administrador_assignat: admin@finca.cat
                  summary: Resposta aprovació
                RespostaRebuig:
                  value:
                    detail: 'Verificació #42 rebutjada.'
                    motiu: El certificat aportat ha caducat.
                  summary: Resposta rebuig
          description: Decisió aplicada. Consulta els exemples per veure el cos de
            resposta.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRevisio'
              examples:
                AccióInvàlida:
                  value:
                    detail: El camp 'accio' ha de ser 'aprovar' o 'rebutjar'.
                  summary: Acció invàlida
                MotiuAbsentEnRebuig:
                  value:
                    detail: Cal indicar un 'motiu' quan es rebutja una verificació.
                  summary: Motiu absent en rebuig
          description: Dades invàlides. Pot ser perquè 'accio' no és 'aprovar' ni
            'rebutjar', o perquè s'ha intentat rebutjar sense indicar 'motiu'.
        '401':
          description: No autenticat. Cal proporcionar credencials vàlides.
        '403':
          description: Sense permisos. Només accessible per AdminFinca o AdminSistema.
        '404':
          description: Verificació no trobada.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflicteEstat'
          description: Conflicte d'estat. La verificació no es troba en estat 'review'.
  /api/verification/create/:
    post:
      operationId: verification_create_create
      description: |-
        Crea una nova sol·licitud de verificació d'administrador de finca per a un edifici concret. S'han d'adjuntar entre 1 i 10 documents (PDF, JPEG, PNG o WEBP, màxim 10 MB cadascun). Cada fitxer ha d'anar acompanyat del seu tipus declarat (`documents_doc_type`).

        Un cop creada la verificació, es llança automàticament el pipeline asíncron de Celery que executa OCR, extracció estructurada via LLM i scoring. La verificació transitarà pels estats `pending` → `running` → `review` (o `rejected` si el pipeline falla de manera definitiva).

        **Restricció:** No es pot crear una nova verificació si ja n'existeix una en curs (`pending`, `running` o `review`) per al mateix usuari i edifici.
      summary: Crear una nova verificació documental
      tags:
      - Verificació
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerificationCreateMultipart'
        required: true
      responses:
        '201':
          description: Verificació creada correctament. El pipeline asíncron ja ha
            estat llançat.
        '400':
          description: 'Error de validació. Possibles causes: cap fitxer adjuntat,
            més de 10 documents, tipus de fitxer no permès, mida superior a 10 MB,
            nombre de fitxers i tipus que no coincideix, o verificació en curs existent.'
        '401':
          description: No autenticat. Cal proporcionar credencials vàlides.
        '403':
          description: Sense permisos. Només accessible per AdminFinca o AdminSistema.
components:
  schemas:
    AccioEnum:
      enum:
      - aprovar
      - rebutjar
      type: string
      description: |-
        * `aprovar` - aprovar
        * `rebutjar` - rebutjar
    AdminFincaAltaResponse:
      type: object
      properties:
        message:
          type: string
        edifici_id:
          type: integer
        requereix_verificacio:
          type: boolean
      required:
      - edifici_id
      - message
      - requereix_verificacio
    AmbitEnum:
      enum:
      - Privat
      - Comu
      - Edifici
      type: string
      description: |-
        * `Privat` - Habitatge privat
        * `Comu` - Element comú
        * `Edifici` - Edifici complet
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          nullable: true
        user_email:
          type: string
          format: email
          readOnly: true
        method:
          type: string
          maxLength: 10
        endpoint:
          type: string
          maxLength: 500
        resource_type:
          type: string
          maxLength: 100
        resource_id:
          type: string
          maxLength: 100
        status_code:
          type: integer
          maximum: 32767
          minimum: 0
        ip_address:
          type: string
          nullable: true
        user_agent:
          type: string
          maxLength: 500
        duration_ms:
          type: integer
          maximum: 2147483647
          minimum: 0
        timestamp:
          type: string
          format: date-time
          readOnly: true
      required:
      - duration_ms
      - endpoint
      - id
      - method
      - status_code
      - timestamp
      - user_email
    AutocompleteCarrerItem:
      type: object
      properties:
        codi_via:
          type: integer
        codi_carrer_ine:
          type: string
        nom_oficial:
          type: string
        nom_curt:
          type: string
        tipus_via:
          type: string
        nre_min:
          type: integer
          nullable: true
        nre_max:
          type: integer
          nullable: true
      required:
      - codi_carrer_ine
      - codi_via
      - nom_curt
      - nom_oficial
      - nre_max
      - nre_min
      - tipus_via
    BadgesResponse:
      type: object
      properties:
        edifici:
          type: integer
        temporada:
          type: string
          nullable: true
        count:
          type: integer
        summary:
          type: object
          additionalProperties: {}
        results:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - count
      - edifici
      - results
      - summary
      - temporada
    BlankEnum:
      enum:
      - ''
    CatalegMillora:
      type: object
      properties:
        idMillora:
          type: integer
          readOnly: true
        slug:
          type: string
          nullable: true
          description: Identificador estable per seeds, frontend i motor de simulació.
          maxLength: 120
          pattern: ^[-a-zA-Z0-9_]+$
        nom:
          type: string
          maxLength: 255
        descripcio:
          type: string
        categoria:
          $ref: '#/components/schemas/CatalegMilloraCategoriaEnum'
        activa:
          type: boolean
        unitatBase:
          $ref: '#/components/schemas/UnitatBaseEnum'
        costEstimatBase:
          type: number
          format: double
          description: Cost orientatiu per unitat base. No és pressupost oficial.
        costOrientatiuUnitari:
          type: number
          format: double
          readOnly: true
        mantenimentAnual:
          type: number
          format: double
          description: Cost orientatiu anual de manteniment per unitat base.
        vidaUtil:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Vida útil orientativa en anys.
        estalviEnergeticEstimat:
          type: number
          format: double
